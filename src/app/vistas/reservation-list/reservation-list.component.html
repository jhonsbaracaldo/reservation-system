<h1>Lista de usuarios</h1>
<div class="container">
<table class=" table table-striped">
<thead class="table-dark">
  <tr>
    <th>Nombre</th>
    <th>Apellido</th>
    <th>Telefono</th>
    <th>Email</th>
  </tr>
</thead>
  <tbody>
    <tr *ngFor="let usuario of usuarios">
      <td>{{usuario.name}}</td>
      <td>{{usuario.lastName}}</td>
      <td>{{usuario.phone}}</td>
      <td>{{usuario.email}}</td>
    </tr>
  </tbody>
  
  </table>
</div>
